name: Weekly Real Estate Data Update

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write # Required to allow deploying to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch and Filter Zillow / Geo Data
        run: |
          npm run fetch-real-estate-data
          npm run fetch-geo-data

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff-index --quiet HEAD || git commit -m "Automated weekly real estate data update"
          git push origin main

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages # Deploys the built dist folder to the gh-pages branch
